<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>이달의 청소구역</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- 이미지 저장을 위한 html2canvas 라이브러리 -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <!-- 3가지 귀여운 폰트 적용 (Jua, Gamja Flower, Hi Melody) -->
    <link href="https://fonts.googleapis.com/css2?family=Gamja+Flower&family=Hi+Melody&family=Jua&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        body {
            font-family: sans-serif;
            background-color: #f3f4f6;
        }

        /* 폰트 클래스 3가지 정의 */
        .font-title { font-family: 'Jua', sans-serif; }
        .font-role { font-family: 'Gamja Flower', cursive; }
        .font-name { font-family: 'Hi Melody', cursive; }

        /* 캔바 포스터 느낌의 배경 */
        #poster-area {
            background-color: #4a5d4e; /* 올리브 그린 */
            position: relative;
            overflow: hidden;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        }

        /* 배경 꾸미기 요소들 */
        .bg-star {
            position: absolute;
            color: white;
            opacity: 0.8;
            font-size: 2rem;
            z-index: 0;
        }
        .bg-shape {
            position: absolute;
            width: 150px;
            height: 150px;
            background-color: rgba(255, 255, 255, 0.05);
            border-radius: 40% 60% 70% 30% / 40% 50% 60% 50%;
            z-index: 0;
        }

        /* 청소 구역 카드 (포스트잇 느낌) */
        .roster-card {
            position: relative;
            z-index: 10;
            border-radius: 8px;
            box-shadow: 2px 4px 10px rgba(0,0,0,0.15);
            transition: transform 0.2s;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }
        .roster-card:hover {
            transform: translateY(-2px);
        }
        
        /* 카드 헤더 (진한 색상, 역할) - 위로 이동 및 겹치기 */
        .card-header {
            padding: 6px 16px;
            text-align: center;
            font-size: 1.6rem;
            color: white;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.2);
            width: fit-content;
            margin: 0 auto;
            margin-bottom: -15px; /* 아래 학생 이름 영역과 살짝 겹치도록 설정 */
            border-radius: 8px;
            position: relative;
            z-index: 20; /* 바디보다 위에 보이도록 */
            min-width: 60%;
            letter-spacing: 1px;
        }

        /* 카드 바디 (연한 색상, 학생 이름) - 아래로 이동 */
        .card-body {
            padding: 25px 10px 15px 10px; /* 위쪽 여백을 늘려 헤더가 겹칠 공간 확보 */
            text-align: center;
            font-size: 1.6rem;
            line-height: 1.5;
            color: #333;
            flex-grow: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 110px;
            border-radius: 8px;
            position: relative;
            z-index: 10;
        }

        /* 직접 텍스트 수정 가능 영역 스타일 */
        [contenteditable="true"]:focus {
            outline: 2px dashed rgba(255,255,255,0.5);
            background-color: rgba(255,255,255,0.2);
            border-radius: 4px;
        }

        /* 인쇄 시 스타일 설정 */
        @media print {
            body { background-color: white; }
            #controls, #settings-modal, .no-print { display: none !important; }
            #poster-wrapper { padding: 0 !important; margin: 0 !important; }
            #poster-area { 
                box-shadow: none; 
                width: 100% !important; 
                height: 100vh !important; 
                page-break-after: always;
                -webkit-print-color-adjust: exact;
                print-color-adjust: exact;
            }
        }

        /* 색상 테마 정의 */
        .theme-0-head { background-color: #c09e37; } .theme-0-body { background-color: #fbe654; } /* 노랑 */
        .theme-1-head { background-color: #cc4f52; } .theme-1-body { background-color: #f2555a; color: white;} /* 빨강 */
        .theme-2-head { background-color: #4052eb; } .theme-2-body { background-color: #5869f5; color: white;} /* 파랑 */
        .theme-3-head { background-color: #c99f2b; } .theme-3-body { background-color: #fbdd53; } /* 머스타드 */
        .theme-4-head { background-color: #d1c8b3; } .theme-4-body { background-color: #fbf5eb; } /* 베이지 */
        .theme-5-head { background-color: #90be4b; } .theme-5-body { background-color: #bbf062; } /* 연두 */
        
        /* 스크롤바 꾸미기 (모달용) */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #f1f1f1; border-radius: 4px;}
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px;}
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
    </style>
</head>
<body class="flex flex-col h-screen text-gray-800">

    <!-- 상단 컨트롤 패널 -->
    <div id="controls" class="bg-white shadow-md p-4 flex flex-wrap items-center justify-between gap-4 z-50 relative">
        <div class="flex items-center gap-3">
            <h1 class="text-2xl font-bold text-gray-700 mr-2"><i class="fa-solid fa-broom text-green-600"></i> 청소구역 알리미</h1>
            
            <select id="month-select" class="border-2 border-gray-300 rounded-lg px-3 py-2 text-lg focus:outline-none focus:border-green-500 cursor-pointer" onchange="updateTitle()">
                <option value="1">1월</option><option value="2">2월</option>
                <option value="3" selected>3월</option><option value="4">4월</option>
                <option value="5">5월</option><option value="6">6월</option>
                <option value="7">7월</option><option value="8">8월</option>
                <option value="9">9월</option><option value="10">10월</option>
                <option value="11">11월</option><option value="12">12월</option>
            </select>
        </div>

        <div class="flex items-center gap-2">
            <button onclick="randomize()" class="bg-blue-500 hover:bg-blue-600 text-white px-4 py-2 rounded-lg shadow transition duration-200 text-lg flex items-center gap-2">
                <i class="fa-solid fa-dice"></i> 뽑기
            </button>
            <button onclick="resetRoster()" class="bg-gray-400 hover:bg-gray-500 text-white px-4 py-2 rounded-lg shadow transition duration-200 text-lg flex items-center gap-2">
                <i class="fa-solid fa-rotate-right"></i> 리셋
            </button>
            <div class="w-px h-8 bg-gray-300 mx-1"></div>
            <button onclick="saveAsImage()" class="bg-green-600 hover:bg-green-700 text-white px-4 py-2 rounded-lg shadow transition duration-200 text-lg flex items-center gap-2">
                <i class="fa-solid fa-download"></i> 이미지 저장
            </button>
            <button onclick="window.print()" class="bg-purple-500 hover:bg-purple-600 text-white px-4 py-2 rounded-lg shadow transition duration-200 text-lg flex items-center gap-2">
                <i class="fa-solid fa-print"></i> 프린트
            </button>
            <button onclick="toggleSettings()" class="bg-gray-100 hover:bg-gray-200 text-gray-600 p-2 rounded-full shadow border border-gray-300 transition duration-200 ml-2" title="설정">
                <i class="fa-solid fa-gear text-xl"></i>
            </button>
        </div>
    </div>

    <!-- 포스터 영역 래퍼 (가운데 정렬) -->
    <div id="poster-wrapper" class="flex-grow flex items-center justify-center p-4 overflow-auto">
        
        <!-- 실제 캡처/인쇄 될 포스터 디자인 영역 -->
        <div id="poster-area" class="w-full max-w-3xl aspect-[1/1.414] rounded-xl flex flex-col p-8 pt-12 relative" style="max-height: 90vh;">
            
            <!-- 배경 데코레이션 -->
            <i class="fa-solid fa-star bg-star top-10 left-10 text-3xl"></i>
            <i class="fa-solid fa-star bg-star top-16 left-24 text-xl"></i>
            <i class="fa-solid fa-star bg-star bottom-32 left-10 text-4xl opacity-50"></i>
            <i class="fa-solid fa-sparkles bg-star right-10 top-60 text-4xl"></i>
            <div class="bg-shape -bottom-10 -right-10 w-64 h-64"></div>
            <div class="bg-shape -top-20 -right-10 w-48 h-48 opacity-10"></div>
            <!-- 클립 데코 -->
            <div class="absolute bottom-24 left-1/2 transform -translate-x-1/2 z-0 opacity-80" style="font-size: 4rem; color: #a1b09f;">
                <i class="fa-solid fa-paperclip rotate-45 mr-2"></i>
                <i class="fa-solid fa-paperclip -rotate-12"></i>
            </div>

            <!-- 제목 -->
            <h2 class="font-title text-center text-5xl md:text-6xl text-yellow-400 mb-12 z-10 tracking-wider" style="text-shadow: 2px 3px 0px rgba(0,0,0,0.3);">
                <span id="display-month">3</span>월 청소구역
            </h2>

            <!-- 청소 구역 그리드 -->
            <div id="roster-grid" class="grid grid-cols-2 gap-x-8 gap-y-12 z-10 px-4 md:px-12 flex-grow content-start">
                <!-- 자바스크립트로 카드가 생성되는 곳 -->
            </div>
        </div>
    </div>

    <!-- 설정 모달창 -->
    <div id="settings-modal" class="fixed inset-0 bg-black bg-opacity-50 hidden items-center justify-center z-50">
        <div class="bg-white rounded-xl shadow-2xl p-6 w-full max-w-lg mx-4 max-h-[90vh] flex flex-col">
            <div class="flex justify-between items-center border-b pb-3 mb-4">
                <h3 class="text-2xl font-bold text-gray-800"><i class="fa-solid fa-gear"></i> 기본 설정</h3>
                <button onclick="toggleSettings()" class="text-gray-500 hover:text-red-500 text-2xl">&times;</button>
            </div>
            
            <div class="overflow-y-auto pr-2 flex-grow">
                <div class="mb-4">
                    <label class="block text-gray-700 font-bold mb-2">학생 명단 (콤마 또는 줄바꿈으로 구분)</label>
                    <textarea id="students-input" rows="5" class="w-full border border-gray-300 rounded-lg p-3 focus:outline-none focus:border-green-500 font-sans text-sm"></textarea>
                    <p class="text-xs text-gray-500 mt-1">* 띄어쓰기가 포함된 이름도 그대로 인식됩니다.</p>
                </div>

                <div>
                    <label class="block text-gray-700 font-bold mb-2">청소 구역 목록 (줄바꿈으로 구분)</label>
                    <textarea id="areas-input" rows="6" class="w-full border border-gray-300 rounded-lg p-3 focus:outline-none focus:border-green-500 font-sans text-sm"></textarea>
                    <p class="text-xs text-gray-500 mt-1">* 구역 개수에 맞게 카드가 생성됩니다. (최대 6개 권장)</p>
                </div>
            </div>

            <div class="mt-6 pt-4 border-t flex justify-end gap-2">
                <button onclick="toggleSettings()" class="px-4 py-2 bg-gray-200 text-gray-700 rounded-lg hover:bg-gray-300 transition">취소</button>
                <button onclick="saveSettings()" class="px-4 py-2 bg-green-600 text-white rounded-lg hover:bg-green-700 transition">저장 및 적용</button>
            </div>
        </div>
    </div>

    <script>
        // 초기 데이터 세팅 (이미지 기반)
        let students = [
            "강윤찬", "강주연", "김민지", "김진후", "김현지", "박채현",
            "성서아", "송다정", "엄호준", "윤시우", "이솔빛나", "이정",
            "전성후", "정혜원", "최예은", "한태은", "허은서", "황혜리", "이창민"
        ];
        
        let areas = [
            "교실 쓸기",
            "책상 밀기",
            "분리수거, 복도",
            "선생님 책상",
            "환기, 칠판",
            "과학실"
        ];

        // 배정 결과 저장용 객체
        let assignments = {};

        // 초기화 시 실행
        window.onload = () => {
            initAssignments();
            renderGrid();
            populateSettings();
            updateTitle();
        };

        // 배정 객체 초기화
        function initAssignments() {
            assignments = {};
            areas.forEach(area => {
                assignments[area] = [];
            });
        }

        // 월 변경 시 제목 업데이트
        function updateTitle() {
            const month = document.getElementById('month-select').value;
            document.getElementById('display-month').innerText = month;
        }

        // 그리드 화면 그리기
        function renderGrid() {
            const grid = document.getElementById('roster-grid');
            grid.innerHTML = '';

            areas.forEach((area, index) => {
                // 테마 클래스 선택 (0~5 순환)
                const themeIdx = index % 6;
                const headTheme = `theme-${themeIdx}-head`;
                const bodyTheme = `theme-${themeIdx}-body`;

                // 배치된 학생 이름 조합 (없으면 안내 메시지)
                let assignedText = assignments[area].join(', ');
                if(!assignedText) assignedText = "<span style='opacity:0.5; font-size:1rem;'>비어있음</span>";

                // 약간의 삐뚤어짐 효과 (포스트잇 느낌)
                const rotation = (Math.random() * 4 - 2).toFixed(1); // -2deg to 2deg
                
                const cardHTML = `
                    <div class="roster-card" style="transform: rotate(${rotation}deg);">
                        <div class="card-header font-role ${headTheme}">
                            ${area}
                        </div>
                        <div class="card-body font-name ${bodyTheme}">
                            <!-- contenteditable을 통해 화면에서 직접 타이핑 수정 가능 -->
                            <div contenteditable="true" class="w-full focus:outline-none" data-area="${area}">
                                ${assignedText}
                            </div>
                        </div>
                    </div>
                `;
                grid.insertAdjacentHTML('beforeend', cardHTML);
            });

            // 직접 수정한 내용을 assignments 객체에 동기화하기 위한 이벤트 리스너
            document.querySelectorAll('[contenteditable="true"]').forEach(el => {
                el.addEventListener('blur', function() {
                    const area = this.getAttribute('data-area');
                    // html 태그 제거 후 콤마로 분리하여 저장 (간이 동기화)
                    let text = this.innerText.replace(/비어있음/g, '').trim();
                    if(text) {
                        assignments[area] = text.split(',').map(s => s.trim()).filter(s => s);
                    } else {
                        assignments[area] = [];
                    }
                });
            });
        }

        // 랜덤 뽑기 로직
        function randomize() {
            // 효과음이나 애니메이션 효과 추가 가능
            
            initAssignments();
            
            // 학생 배열 복사 및 셔플 (Fisher-Yates 알고리즘)
            let shuffled = [...students];
            for (let i = shuffled.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
            }

            // 구역별로 순서대로 분배
            if(areas.length > 0) {
                let areaIndex = 0;
                shuffled.forEach(student => {
                    assignments[areas[areaIndex]].push(student);
                    areaIndex = (areaIndex + 1) % areas.length;
                });
            }

            renderGrid();
        }

        // 배정 리셋
        function resetRoster() {
            if(confirm('배정된 청소 인원을 모두 비우시겠습니까?')) {
                initAssignments();
                renderGrid();
            }
        }

        // 이미지 저장 (html2canvas 사용)
        function saveAsImage() {
            const poster = document.getElementById('poster-area');
            
            // 저장 전 꾸미기 (선택 표시 제거 등)
            document.querySelectorAll('[contenteditable="true"]').forEach(el => el.blur());

            // 모바일 등 환경 고려 scale 설정
            html2canvas(poster, {
                scale: 2, 
                backgroundColor: '#4a5d4e',
                useCORS: true
            }).then(canvas => {
                const month = document.getElementById('month-select').value;
                const link = document.createElement('a');
                link.download = `${month}월_청소구역.png`;
                link.href = canvas.toDataURL('image/png');
                link.click();
            }).catch(err => {
                alert('이미지 저장 중 오류가 발생했습니다.');
                console.error(err);
            });
        }

        // --- 설정 관련 로직 ---
        
        function toggleSettings() {
            const modal = document.getElementById('settings-modal');
            modal.classList.toggle('hidden');
            modal.classList.toggle('flex');
            if(!modal.classList.contains('hidden')) {
                populateSettings();
            }
        }

        function populateSettings() {
            document.getElementById('students-input').value = students.join(', ');
            document.getElementById('areas-input').value = areas.join('\n');
        }

        function saveSettings() {
            // 학생 목록 파싱 (콤마 또는 줄바꿈으로 구분)
            const stuRaw = document.getElementById('students-input').value;
            students = stuRaw.split(/,|\n/).map(s => s.trim()).filter(s => s.length > 0);

            // 구역 목록 파싱 (줄바꿈 기준)
            const areaRaw = document.getElementById('areas-input').value;
            let newAreas = areaRaw.split('\n').map(a => a.trim()).filter(a => a.length > 0);
            
            if(newAreas.length === 0) {
                alert('최소 1개 이상의 청소 구역이 필요합니다.');
                return;
            }
            areas = newAreas;

            initAssignments(); // 구역이 변경되었으므로 배정 초기화
            renderGrid();
            toggleSettings();
        }

    </script>
</body>
</html>
